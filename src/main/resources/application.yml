server:
  port: 8080

spring:
  application:
    name: course_work_6sem
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:real_estate_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      # В дев-режиме база может быть не полностью синхронизирована с сущностями (тип PK и т.п.).
      # Liquibase отвечает за миграции, поэтому отключаем строгую проверку схемы, чтобы сервер стартовал.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        default_schema: public
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            # Важно: если env не задан, лучше получать null, а не пустую строку.
            # Иначе Spring валидирует client-id как "must not be empty" и падет на старте.
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:#{null}}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:#{null}}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com

app:
  jwt:
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    issuer: ${JWT_ISSUER:course-work-6sem}
    # Для HS256 ключ должен быть не короче 256 бит.
    secret: ${JWT_SECRET:dev-secret-dev-secret-dev-secret-dev-secret-dev-secret-dev-secret-dev}
  external:
    currency:
      base: USD

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

